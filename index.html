 <div class="container">

            <div class="settings">
                <button id="togglatIA" class="btn">cambiar a IA 🤖</button>
                  <button id="togglatsaund" class="btn">sonidos:ON 🔔</button>
            <lebel for="">dificultad IA</lebel>
            <input type="range" id="airange" min="0.6" max="0.26" step="0.26">
            </div>
        </div>
    </div>
 </div>
